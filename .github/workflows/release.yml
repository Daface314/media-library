name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and publish release
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # GH_TOKEN lets electron-builder create the GitHub Release and upload the .exe
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
